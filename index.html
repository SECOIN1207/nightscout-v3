<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#071327">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NightScout">
<title>NightScout V3</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<div class="app-shell">

  <header class="hero card glass">
    <img class="hero-icon" src="icons/icon-192.png" alt="NightScout icon">
    <div class="hero-copy">
      <div class="eyebrow">Nightlife intelligence</div>
      <h1>NightScout V3</h1>
      <p>Find the right crowd, drink prices, events, and best meet-up spot before anyone leaves the house.</p>
    </div>
    <div class="hero-pill">Nationwide-ready</div>
  </header>

  <section class="search-panel card glass">
    <div class="mode-switch">
      <button class="mode active" data-mode="solo">Solo search</button>
      <button class="mode" data-mode="middle">Meet in the middle</button>
      <button class="mode" data-mode="group">Group plan</button>
      <button class="mode" data-mode="ai">AI Scout</button>
    </div>

    <div id="solo-mode" class="mode-panel active">
      <label>City, state, ZIP, or “near me”</label>
      <input id="soloQuery" placeholder="Montclair NJ, 07042, or near me">
      <div class="button-row">
        <button class="primary" id="runSolo">Find venues</button>
        <button class="secondary" id="loadNj">Explore all NJ</button>
        <button class="fun" id="runFun">🎲 Surprise me</button>
      </div>
    </div>

    <div id="middle-mode" class="mode-panel">
      <label>Your location</label>
      <input id="midA" placeholder="Newark NJ">
      <label>Friend location</label>
      <input id="midB" placeholder="Fairview NJ">
      <div class="button-row">
        <button class="primary" id="runMiddle">Find middle spot</button>
      </div>
    </div>

    <div id="group-mode" class="mode-panel">
      <label>Group locations (up to 10)</label>
      <textarea id="groupList" rows="5" placeholder="Newark NJ&#10;Fairview NJ&#10;Hoboken NJ&#10;Montclair NJ"></textarea>
      <div class="button-row">
        <button class="primary" id="runGroup">Triangulate group</button>
      </div>
    </div>

    <div id="ai-mode" class="mode-panel">
      <label>Talk to NightScout AI</label>
      <textarea id="aiPrompt" rows="4" placeholder="Find a 40+ crowd with $5 beers, live music, and easy parking near Morristown tonight."></textarea>
      <div class="button-row">
        <button class="primary" id="runAi">Ask AI Scout</button>
      </div>
    </div>
  </section>

  <section class="filters card glass">
    <div class="section-head">
      <h2>Filters</h2>
      <span>Tap what matters</span>
    </div>
